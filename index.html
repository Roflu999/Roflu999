   const MASSES={H:1.008,C:12.011,N:14.00 7,O:15.999,Na:22.99,Mg:24.305,Al :26.982,Si:28.085,P:30.974,S:32.

   function parse(f){let c={},i=0;f=f.replace(/\s/g,'');while(i<f.length){if(f[i]=='('){let
 d=1,j=i+1;while(j<f.length&&d>0) {if(f[j]=='(')d++;else if(f[j]==')')d--;j++;}let
 s=parse(f.slice(i+1,j-1)),k=j;while(k<f.length&&/\d/.test(f[k]))k++;let m=k>j?parseInt(f.slice(j,k)):1;f or(let[e,n]of

 n=0;while(i<f.length&&/\d/.test(f[i]))n=n*10+parseInt(f[i++]);c[e]=(c[e]||0)+(n||1);}else i++;}return c;}

   function calcMass(f){let c=parse(f),t=0,l=[];for(let[e,n] of Object.entries(c).sort()){if(!MA SSES[e])return

 rties[0];return{name,formula:p.M olecularFormula,mass:p.Molecular Weight,iupac:p.IUPACName};}catch (e){return null;}}

   if(m.includes('sodium')&&m.inclu des('water')){return`**2Na + 2H₂O → 2NaOH + H₂** 💥\n\nSodium rips H from water →
