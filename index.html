<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemTutor AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #343541; color: #ececf1; height: 100vh; display: flex; flex-direction: column;
        }
        .header { background: #202123; padding: 15px; text-align: center; border-bottom: 1px solid #4d4d4f; }
        .header h1 { font-size: 20px; }
        .chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { padding: 15px; margin-bottom: 10px; border-radius: 8px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .msg.user { background: #5436da; }
        .msg.bot { background: #444654; white-space: pre-line; }
        .input-area { padding: 20px; background: #202123; display: flex; gap: 10px; max-width: 800px; margin: 0 auto; width: 100%; }
        .input-area input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #40414f; color: #fff; font-size: 16px; }
        .input-area button { padding: 12px 24px; border: none; border-radius: 8px; background: #19c37d; color: #fff; cursor: pointer; font-size: 16px; }
        .input-area button:hover { background: #15a369; }
        .start { text-align: center; padding: 50px 20px; }
        .start h2 { margin-bottom: 20px; }
        .example { background: #3e3f4b; padding: 15px; margin: 10px auto; max-width: 400px; border-radius: 8px; cursor: pointer; }
        .example:hover { background: #4a4b59; }
    </style>
</head>
<body>
    <div class="header"><h1>⚗️ ChemTutor AI</h1></div>
    
    <div class="chat" id="chat">
        <div class="start" id="start">
            <h2>Ask me anything about chemistry!</h2>
            <div class="example" onclick="ask('Calculate molar mass of H2SO4')">Calculate molar mass of H2SO4</div>
            <div class="example" onclick="ask('Explain SN1 vs SN2')">Explain SN1 vs SN2</div>
            <div class="example" onclick="ask('What is pH of 0.1M HCl?')">What is pH of 0.1M HCl?</div>
            <div class="example" onclick="ask('Why does sodium explode in water?')">Why does sodium explode in water?</div>
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="input" placeholder="Type your question..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">Send</button>
    </div>

<script>
const ATOMIC_MASSES = {H:1.008,C:12.01,N:14.01,O:16,Na:22.99,Mg:24.31,Al:26.98,Si:28.09,P:30.97,S:32.07,Cl:35.45,K:39.1,Ca:40.08,Fe:55.85,Cu:63.55,Zn:65.39,Br:79.9,Ag:107.9,I:126.9,Au:197,Hg:200.6,Pb:207.2};

function parseFormula(f){
    let c={},i=0;f=f.replace(/\s/g,'');
    while(i<f.length){
        if(f[i]=='('){let d=1,j=i+1;while(j<f.length&&d>0){if(f[j]=='(')d++;else if(f[j]==')')d--;j++;}let s=parseFormula(f.slice(i+1,j-1)),k=j;while(k<f.length&&/\d/.test(f[k]))k++;let m=k>j?parseInt(f.slice(j,k)):1;for(let[e,n]of Object.entries(s))c[e]=(c[e]||0)+n*m;i=k;}
        else if(/[A-Z]/.test(f[i])){let e=f[i++];if(i<f.length&&/[a-z]/.test(f[i]))e+=f[i++];let n=0;while(i<f.length&&/\d/.test(f[i]))n=n*10+parseInt(f[i++]);c[e]=(c[e]||0)+(n||1);}
        else i++;
    }return c;
}

function calcMass(f){
    let c=parseFormula(f),t=0,l=[];
    for(let[e,n]of Object.entries(c).sort()){if(!ATOMIC_MASSES[e])return null;let m=ATOMIC_MASSES[e]*n;t+=m;l.push(`${e}: ${n} × ${ATOMIC_MASSES[e]} = ${m.toFixed(3)} g/mol`);}
    return{total:t,lines:l,formula:f};
}

function answer(q){
    let m=q.toLowerCase();
    if(m.includes('molar mass')||m.includes('molecular weight')){let x=q.match(/([A-Z][a-z0-9()]+)/);if(x){let r=calcMass(x[1]);if(r)return`**Molar Mass of ${r.formula}: ${r.total.toFixed(3)} g/mol**\n\n${r.lines.join('\n')}\n\nOne mole = ${r.total.toFixed(2)} grams`;}}
    if(m.includes('sn1')||m.includes('sn2'))return`**SN2:** One step, backside attack, 1°/2° only, inversion\n**SN1:** Two steps, carbocation, 3°/2°, racemic\n\nKey: SN2=no rearrangements, SN1=can rearrange!`;
    if(m.includes('sodium')&&m.includes('water'))return`**2Na + 2H₂O → 2NaOH + H₂** 💥\n\nSodium rips H from water → H₂ gas + heat → BOOM!\n\n⚠️ Don't try this at home!`;
    if(m.includes('gallium'))return`**Gallium melts at 29.76°C** (body temp)!\n\nHold it → it liquefies! Used in blue LEDs (GaN).`;
    if(m.includes('ph')&&m.includes('acid')){let x=q.match(/(\d+\.?\d*)\s*M/);if(x){let pH=-Math.log10(parseFloat(x[1]));return`pH = ${pH.toFixed(2)}`;}}
    return`I can help with:\n• Molar mass (e.g. "H2SO4")\n• SN1/SN2 reactions\n• Sodium + water\n• pH calculations\n• Periodic trends`;
}

function ask(text){
    document.getElementById('input').value=text;
    send();
}

function send(){
    let input=document.getElementById('input'),q=input.value.trim();
    if(!q)return;
    let chat=document.getElementById('chat'),start=document.getElementById('start');
    if(start)start.style.display='none';
    chat.innerHTML+=`<div class="msg user"><b>You:</b> ${q}</div>`;
    input.value='';
    setTimeout(()=>{
        let a=answer(q);
        chat.innerHTML+=`<div class="msg bot"><b>ChemTutor:</b> ${a.replace(/\*\*/g,'').replace(/\n/g,'<br>')}</div>`;
        chat.scrollTop=chat.scrollHeight;
    },300);
}
</script>
</body>
</html>
